version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shiftsync-postgres
    environment:
      POSTGRES_DB: shiftsync
      POSTGRES_USER: shiftsync_user
      POSTGRES_PASSWORD: shiftsync_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftsync_user -d shiftsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shiftsync-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: