spring:
  application:
    name: ShiftSync

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ShiftSync}
    username: shiftsync_db_z62u_user
    password: IPJEOoq2EN7RWHoPTFfuX3eNiZBm4h1i
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  profiles:
    active: ${SPRING_PROFILE:mock}

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  wfh:
    monthly-reset-day: 1          # Reset on 1st of every month
    monthly-allowance: 2          # 2 WFH days per month

  compoff:
    expiry-months: 3              # Comp-off expires in 3 months

  leave:
    default-credits:
      ANNUAL: 18
      MEDICAL: 12
      MATERNITY: 180
      PATERNITY: 5
      COMP_OFF: 0                 # Auto-credited
      LOP: 0                      # Loss of pay, no credit

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shiftsync: DEBUG
    org.springframework.security: INFO